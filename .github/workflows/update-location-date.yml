name: Update location data date

# Runs automatically whenever either locations file is pushed to main.
# Reads the commit date of that push and rewrites the "Location data
# updated: <date>" line in index.html to match — no manual editing needed.

on:
  push:
    branches: [main]
    paths:
      - 'stewarts-locations.js'
      - 'cumberland-farms-locations.js'

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest location data commit date
        id: date
        run: |
          DATE=$(git log -1 --format=%cd --date=format:'%B %-d, %Y' -- stewarts-locations.js cumberland-farms-locations.js)
          echo "Latest location data change: $DATE"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Update index.html
