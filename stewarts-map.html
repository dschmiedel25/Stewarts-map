<style>
  :root{
    --charcoal:#1c1c1e; --amber:#f5a623; --cream:#fdf6e9; --green:#2f6b3c;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--charcoal);color:var(--cream);}
  #header{
    padding:14px 16px 10px;background:linear-gradient(180deg,#161616,#1c1c1e);
    border-bottom:2px solid var(--amber);
  }
  #header h1{margin:0;font-size:19px;letter-spacing:.3px;}
  #header p{margin:4px 0 0;font-size:12.5px;color:#c9c2b3;}
  #map{position:absolute;top:76px;bottom:0;left:0;right:0;}
  .leaflet-popup-content-wrapper{background:#fffaf0;border-radius:10px;}
  .popup-inner{min-width:220px;font-size:13px;}
  .popup-inner h3{margin:0 0 4px;font-size:15px;color:#1c1c1e;}
  .popup-inner .addr{color:#666;font-size:11.5px;margin-bottom:8px;}
  .rating-row{margin:6px 0;}
  .rating-label{font-weight:600;font-size:12px;color:#333;display:block;margin-bottom:2px;}
  .stars{font-size:20px;letter-spacing:2px;cursor:pointer;}
  .stars span{cursor:pointer;color:#ddd;transition:color .1s;}
  .stars span.filled{color:var(--amber);}
  .save-note{font-size:11px;color:#2f6b3c;margin-top:4px;height:14px;}
  #addBtn{
    position:absolute;bottom:20px;right:16px;z-index:500;
    background:var(--amber);color:#1c1c1e;border:none;border-radius:50px;
    padding:13px 18px;font-weight:700;font-size:14px;box-shadow:0 3px 10px rgba(0,0,0,.4);
    cursor:pointer;
  }
  #addModal{
    position:absolute;inset:0;z-index:1000;background:rgba(0,0,0,.55);
    display:none;align-items:center;justify-content:center;
  }
  #addModal.open{display:flex;}
  #addModalBox{
    background:#fffaf0;color:#1c1c1e;border-radius:12px;padding:18px;width:80%;max-width:320px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  #addModalBox h3{margin:0 0 10px;font-size:16px;}
  #addModalBox input{
    width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;
    margin-bottom:12px;
  }
  #addModalBox .btnrow{display:flex;gap:8px;justify-content:flex-end;}
  #addModalBox button{
    padding:8px 14px;border-radius:6px;border:none;font-weight:600;font-size:13px;cursor:pointer;
  }
  #addModalCancel{background:#e0e0e0;color:#333;}
  #addModalSave{background:var(--amber);color:#1c1c1e;}
  #legend{
    position:absolute;top:84px;left:10px;z-index:500;background:rgba(28,28,30,.9);
    padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.6;border:1px solid #444;
  }
  #searchBox{
    position:absolute;top:84px;right:10px;z-index:500;
    display:flex;align-items:center;background:rgba(28,28,30,.92);border:1px solid #444;
    border-radius:8px;padding:4px 8px;max-width:52%;
  }
  #searchInput{
    background:transparent;border:none;color:var(--cream);font-size:13px;padding:5px 4px;
    outline:none;width:100%;
  }
  #searchInput::placeholder{color:#aaa;}
  #searchClear{
    background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;padding:0 4px;line-height:1;
  }
  #searchCount{
    position:absolute;top:128px;right:10px;z-index:500;font-size:11px;color:#c9c2b3;
    background:rgba(28,28,30,.85);padding:3px 8px;border-radius:6px;display:none;
  }
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;}
</style>
</head>
<body>

<div id="header">
  <h1>🏪 Stewart's Shops Tracker</h1>
  <p>Tap a pin to rate the store &amp; bathroom. Averages are shared with everyone who opens this map.</p>
</div>

<div id="legend">
  <div><span class="dot" style="background:#4caf50"></span>Has ratings</div>
  <div><span class="dot" style="background:#888"></span>No ratings yet</div>
</div>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Search store #, name, or town..." />
  <button id="searchClear">✕</button>
</div>
<div id="searchCount"></div>

<div id="map"></div>
<button id="addBtn">➕ Add location</button>

<div id="addModal">
  <div id="addModalBox">
    <h3>Name this Stewart's location</h3>
    <input type="text" id="addModalInput" placeholder="e.g. Route 9, Anytown" />
    <div class="btnrow">
      <button id="addModalCancel">Cancel</button>
      <button id="addModalSave">Add pin</button>
    </div>
  </div>
</div>

const map = L.map('map').setView([42.75, -73.80], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

let ratingsCache = {};

function starsHtml(id, type, current){
  let s = '<span class="stars" data-id="'+id+'" data-type="'+type+'">';
  for(let i=1;i<=5;i++){
    s += '<span class="'+(i<=current?'filled':'')+'" data-val="'+i+'">★</span>';
  }
  s += '</span>';
  return s;
}

function markerColor(id){
  const agg = ratingsCache[id];
  return (agg && (agg.storeCount > 0 || agg.bathroomCount > 0)) ? '#4caf50' : '#888';
}

function makeIcon(id){
  return L.divIcon({
    className:'',
    html:'<div style="background:'+markerColor(id)+';width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.6);"></div>',
    iconSize:[16,16],
    iconAnchor:[8,8]
  });
}

function emptyAgg(){ return {storeSum:0, storeCount:0, bathroomSum:0, bathroomCount:0}; }
function emptyVote(){ return {store:0, bathroom:0}; }
function avgStr(sum, count){ return count > 0 ? (sum/count).toFixed(1) : '—'; }

// Wait for the Firebase module script (loaded separately) to finish initializing
async function fb(){
  while(!window.__fb){
    await new Promise(r => setTimeout(r, 20));
  }
  return window.__fb;
}

// A per-browser anonymous ID so "your" vote can be found again on this device
function getClientId(){
  let id = localStorage.getItem('stewarts_client_id');
  if(!id){
    id = 'c_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('stewarts_client_id', id);
  }
  return id;
}

// Shared (public) aggregate — visible to everyone who opens this map
async function loadAggregate(id){
  try{
    const {db, doc, getDoc} = await fb();
    const snap = await getDoc(doc(db, 'aggregates', id));
    if(!snap.exists()) return emptyAgg();
    return { ...emptyAgg(), ...snap.data() };
  }catch(e){
    console.error('load agg failed', e);
    return emptyAgg();
  }
}

// Atomically nudge the shared counters by a delta — safe even if others are rating at the same time
async function bumpAggregate(id, sumKey, sumDelta, countKey, countDelta){
  try{
    const {db, doc, setDoc, increment} = await fb();
    await setDoc(doc(db, 'aggregates', id), {
      [sumKey]: increment(sumDelta),
      [countKey]: increment(countDelta)
    }, { merge: true });
    return true;
  }catch(e){
    console.error('save agg failed', e);
    return false;
  }
}

// Personal (per-device) record of your own vote, so you can edit it later
async function loadMyVote(id){
  try{
    const {db, doc, getDoc} = await fb();
    const snap = await getDoc(doc(db, 'votes', id + '_' + getClientId()));
    if(!snap.exists()) return emptyVote();
    return { ...emptyVote(), ...snap.data() };
  }catch(e){
    return emptyVote();
  }
}
async function saveMyVote(id, data){
  try{
    const {db, doc, setDoc} = await fb();
    await setDoc(doc(db, 'votes', id + '_' + getClientId()), data, { merge: true });
    return true;
  }catch(e){
    return false;
  }
}

function popupHtml(loc, agg, myVote){
  return `<div class="popup-inner" data-locid="${loc.id}">
    <h3>${loc.n}</h3>
    <div class="addr">${loc.addr}${loc.num ? ' &middot; Shop #' + loc.num : ''}</div>
    <div class="rating-row">
      <span class="rating-label">Store — avg ${avgStr(agg.storeSum, agg.storeCount)}★ (${agg.storeCount} ${agg.storeCount===1?'rating':'ratings'})</span>
      ${starsHtml(loc.id,'store',myVote.store)}
    </div>
    <div class="rating-row">
      <span class="rating-label">🚻 Bathroom — avg ${avgStr(agg.bathroomSum, agg.bathroomCount)}★ (${agg.bathroomCount} ${agg.bathroomCount===1?'rating':'ratings'})</span>
      ${starsHtml(loc.id,'bathroom',myVote.bathroom)}
    </div>
    <div class="save-note" id="note-${loc.id}">Your stars below — averages are shared with everyone viewing this map.</div>
  </div>`;
}

function loadingPopupHtml(loc){
  return `<div class="popup-inner" data-locid="${loc.id}">
    <h3>${loc.n}</h3>
    <div class="addr">${loc.addr}${loc.num ? ' &middot; Shop #' + loc.num : ''}</div>
    <div class="save-note" style="color:#888;">Loading ratings…</div>
  </div>`;
}

const markers = {};
const myVoteCache = {};
const loadedIds = new Set();

function addMarker(loc){
  // Nothing is fetched from storage here — that only happens when the popup is opened.
  // This keeps page-load fast and avoids tripping the storage rate limit on 100+ pins at once.
  const marker = L.marker([loc.lat, loc.lng], {icon: makeIcon(loc.id)}).addTo(map);
  marker.bindPopup(loadingPopupHtml(loc));
  marker.on('popupopen', async () => {
    if(!loadedIds.has(loc.id)){
      const agg = await loadAggregate(loc.id);
      const myVote = await loadMyVote(loc.id);
      ratingsCache[loc.id] = agg;
      myVoteCache[loc.id] = myVote;
      loadedIds.add(loc.id);
      marker.setIcon(makeIcon(loc.id));
    }
    marker.setPopupContent(popupHtml(loc, ratingsCache[loc.id], myVoteCache[loc.id]));
    attachStarHandlers(loc);
  });
  markers[loc.id] = marker;
}

function attachStarHandlers(loc){
  const popupEl = document.querySelector(`.popup-inner[data-locid="${loc.id}"]`);
  if(!popupEl) return;
  popupEl.querySelectorAll('.stars').forEach(starGroup => {
    const type = starGroup.dataset.type;
    starGroup.querySelectorAll('span').forEach(starEl => {
      starEl.addEventListener('click', async () => {
        const val = parseInt(starEl.dataset.val);
        const note = document.getElementById('note-'+loc.id);
        if(note) note.textContent = 'Saving...';

        const agg = ratingsCache[loc.id] || emptyAgg();
        const myVote = myVoteCache[loc.id] || emptyVote();
        const prevVal = myVote[type];

        const sumKey = type + 'Sum';
        const countKey = type + 'Count';
        const sumDelta = val - prevVal;
        const countDelta = prevVal > 0 ? 0 : 1;

        // Update local view optimistically so it feels instant
        agg[sumKey] += sumDelta;
        agg[countKey] += countDelta;
        myVote[type] = val;
        ratingsCache[loc.id] = agg;
        myVoteCache[loc.id] = myVote;

        // repaint stars immediately
        starGroup.querySelectorAll('span').forEach((s,i) => {
          s.classList.toggle('filled', (i+1) <= val);
        });

        const okAgg = await bumpAggregate(loc.id, sumKey, sumDelta, countKey, countDelta);
        const okVote = await saveMyVote(loc.id, myVote);
        if(note) note.textContent = (okAgg && okVote) ? 'Saved ✓ — visible to everyone' : 'Save failed';

        // refresh the label text with new average
        const labelEl = starGroup.parentElement.querySelector('.rating-label');
        if(labelEl){
          const sum = agg[sumKey], count = agg[countKey];
          const niceType = type === 'store' ? 'Store' : '🚻 Bathroom';
          labelEl.textContent = `${niceType} — avg ${avgStr(sum,count)}★ (${count} ${count===1?'rating':'ratings'})`;
        }

        if(markers[loc.id]) markers[loc.id].setIcon(makeIcon(loc.id));
      });
    });
  });
}

// Load all seed locations — this is now instant since no storage calls happen until a pin is tapped
seedLocations.forEach(loc => addMarker(loc));

// Add custom location
let addingMode = false;
let pendingLatLng = null;

document.getElementById('addBtn').addEventListener('click', () => {
  addingMode = true;
  document.getElementById('addBtn').textContent = '📍 Tap map to place pin...';
});

map.on('click', (e) => {
  if(!addingMode) return;
  addingMode = false;
  document.getElementById('addBtn').textContent = '➕ Add location';
  pendingLatLng = e.latlng;
  document.getElementById('addModalInput').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('addModalInput').focus(), 50);
});

document.getElementById('addModalCancel').addEventListener('click', () => {
  document.getElementById('addModal').classList.remove('open');
  pendingLatLng = null;
});

document.getElementById('addModalSave').addEventListener('click', async () => {
  const name = document.getElementById('addModalInput').value.trim();
  document.getElementById('addModal').classList.remove('open');
  if(!name || !pendingLatLng) { pendingLatLng = null; return; }
  const id = 'custom-' + Date.now();
  const loc = {n:name, lat:pendingLatLng.lat, lng:pendingLatLng.lng, addr:'Custom pin', id:id};
  seedLocations.push(loc);
  await addMarker(loc);
  markers[id].openPopup();
  pendingLatLng = null;
});

// Allow pressing Enter in the input to save
document.getElementById('addModalInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    document.getElementById('addModalSave').click();
  }
});

// Search / filter by store number, name, address, or town
function locMatches(loc, q){
  if(!q) return true;
  const hay = [
    loc.num || '',
    loc.n || '',
    loc.addr || ''
  ].join(' ').toLowerCase();
  return hay.includes(q);
}

function runSearch(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const countEl = document.getElementById('searchCount');
  if(!q){
    countEl.style.display = 'none';
    seedLocations.forEach(loc => {
      const m = markers[loc.id];
      if(m && !map.hasLayer(m)) m.addTo(map);
    });
    return;
  }
  let matchCount = 0;
  let firstMatch = null;
  seedLocations.forEach(loc => {
    const m = markers[loc.id];
    if(!m) return;
    if(locMatches(loc, q)){
      matchCount++;
      if(!firstMatch) firstMatch = loc;
      if(!map.hasLayer(m)) m.addTo(map);
    } else {
      if(map.hasLayer(m)) map.removeLayer(m);
    }
  });
  countEl.style.display = 'block';
  countEl.textContent = matchCount === 0 ? 'No matches' : `${matchCount} match${matchCount===1?'':'es'}`;
  if(matchCount === 1 && firstMatch){
    map.setView([firstMatch.lat, firstMatch.lng], 15);
    markers[firstMatch.id].openPopup();
  }
}

document.getElementById('searchInput').addEventListener('input', runSearch);
document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  runSearch();
});
